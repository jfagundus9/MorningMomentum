function getTodayName(){
  const d=new Date().getDay();
  return {1:"Monday",2:"Tuesday",3:"Wednesday",4:"Thursday",5:"Friday"}[d]||"Monday";
}
function getWeekKey(){
  const now=new Date(), jan1=new Date(now.getFullYear(),0,1);
  const wk=Math.ceil(((now-jan1)/86400000+jan1.getDay()+1)/7);
  return `${now.getFullYear()}-W${wk}`;
}
function getDayDateKey(dayName){
  const today=new Date(), cur=today.getDay();
  const target={Monday:1,Tuesday:2,Wednesday:3,Thursday:4,Friday:5}[dayName];
  const d=new Date(today); d.setDate(today.getDate()+(target-cur));
  return d.toISOString().split("T")[0];
}
function getWeekScripture(){
  const wk=getWeekKey();
  const hash=wk.split("").reduce((a,c)=>a+c.charCodeAt(0),0);
  return WEEKLY_SCRIPTURES[hash%WEEKLY_SCRIPTURES.length];
}
function getRotatedSource(sources){
  if(!sources||!sources.length) return null;
  const d=new Date().getDay()+Math.floor(new Date().getDate()/7);
  return sources[d%sources.length];
}

// Extract hashtags from text
function extractHashtags(text=""){
  const matches=text.match(/#[\w]+/g)||[];
  return [...new Set(matches.map(t=>t.toLowerCase()))];
}

// Highlight hashtags in text for display
function HighlightedText({ text }){
  const parts=text.split(/(#[\w]+)/g);
  return <span>{parts.map((p,i)=>p.startsWith("#")
    ? <span key={i} style={{color:P.coral,fontWeight:700}}>{p}</span>
    : p)}</span>;
}

// Subtask-aware score — change #13
function calcScore(entries, tasks){
  if(!entries||!tasks||!tasks.length) return {total:0};
  let earned=0, total=0;
  tasks.forEach(t=>{
    const e=entries[t.id]||{};
    if(t.subtasks&&t.subtasks.length>0){
      // Score based on individual subtask completion
      const n=t.subtasks.length;
      const done=t.subtasks.filter(s=>e.subtasks?.[s]).length;
      const pct=done/n;
      total+=t.points;
      earned+=t.points*pct;
    } else {
      const s=e.status;
      total+=t.points;
      if(s==="done")    earned+=t.points;
      else if(s==="partial") earned+=t.points*0.5;
    }
  });
  return {total:total?Math.round((earned/total)*100):0};
}

function ls(k){try{return JSON.parse(localStorage.getItem(k)||"null");}catch{return null;}}
function lsSet(k,v){localStorage.setItem(k,JSON.stringify(v));}

// Share helper
async function shareOrCopy(text){
  if(navigator.share){
    try{ await navigator.share({text}); return; }catch{}
  }
  try{ await navigator.clipboard.writeText(text); return "copied"; }catch{}
  return "error";
}

// ============================================================
// COUNTDOWN TIMER
// ============================================================
function CountdownTimer({mins}){
  const [secs,setSecs]=useState(mins*60);
  const [running,setRunning]=useState(false);
  const [done,setDone]=useState(false);
  const ref=useRef(null);
  useEffect(()=>{
    if(running&&secs>0){ref.current=setInterval(()=>setSecs(s=>{if(s<=1){setRunning(false);setDone(true);clearInterval(ref.current);return 0;}return s-1;}),1000);}
    return()=>clearInterval(ref.current);
  },[running]);
  const mm=String(Math.floor(secs/60)).padStart(2,"0"), ss=String(secs%60).padStart(2,"0");
  return(
    <span style={{display:"inline-flex",alignItems:"center",gap:6,background:done?"#dcfce7":"#f0fdf4",border:`1px solid ${done?"#86efac":"#bbf7d0"}`,borderRadius:20,padding:"3px 10px",fontSize:12}}>
      {done?"✅ Done!":(<>
        <span style={{fontFamily:"monospace",fontWeight:700,color:"#166534"}}>{mm}:{ss}</span>
        <button onClick={()=>setRunning(r=>!r)} style={{background:"none",border:"none",cursor:"pointer",fontSize:14,padding:0}}>{running?"⏸":"▶️"}</button>
        <button onClick={()=>{setSecs(mins*60);setRunning(false);setDone(false);}} style={{background:"none",border:"none",cursor:"pointer",fontSize:11,color:"#6b7280",padding:0}}>↺</button>
      </>)}
    </span>
  );
}

// LOGIN
// ============================================================
function LoginScreen({onLogin}){
  const [mode,setMode]=useState("login");
  const [name,setName]=useState("");
  const [pass,setPass]=useState("");
  const [err,setErr]=useState("");
  const users=ls("mm_users")||{};
  const handle=()=>{
    if(!name.trim()||!pass.trim()){setErr("Please enter a name and password.");return;}
    const key=name.trim().toLowerCase();
    if(mode==="signup"){
      if(users[key]){setErr("That username is already taken.");return;}
      lsSet("mm_users",{...users,[key]:{name:name.trim(),pass,created:Date.now()}});
      onLogin({id:key,name:name.trim()});
    } else {
      if(!users[key]||users[key].pass!==pass){setErr("Name or password incorrect.");return;}
      onLogin({id:key,name:users[key].name});
    }
  };
  return(
    <div style={{minHeight:"100vh",background:`linear-gradient(135deg,${P.yellow}33,${P.peach}33,${P.sky}22)`,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{background:P.white,borderRadius:24,padding:32,width:"100%",maxWidth:360,boxShadow:"0 8px 40px rgba(36,50,74,0.12)"}}>
        <div style={{textAlign:"center",marginBottom:28}}>
          <div style={{fontSize:40,marginBottom:8}}>☀️</div>
          <div style={{fontSize:24,fontWeight:900,color:P.dark,fontFamily:"Georgia,serif"}}>Morning Momentum</div>
          <div style={{fontSize:13,color:P.gray,marginTop:4}}>Your daily fresh start</div>
        </div>
        <div style={{display:"flex",background:"#f0eee8",borderRadius:12,padding:3,marginBottom:20}}>
          {["login","signup"].map(m=>(
            <button key={m} onClick={()=>{setMode(m);setErr("");}} style={{flex:1,padding:"8px",border:"none",borderRadius:10,cursor:"pointer",fontWeight:700,fontSize:13,background:mode===m?P.white:"transparent",color:mode===m?P.dark:P.gray,transition:"all 0.2s"}}>
              {m==="login"?"Sign In":"Create Account"}
            </button>
          ))}
        </div>
        <input placeholder="Your name" value={name} onChange={e=>setName(e.target.value)} style={{width:"100%",padding:"12px 14px",borderRadius:12,border:"1.5px solid #e0ddd5",fontSize:14,marginBottom:10,boxSizing:"border-box",background:"#fafaf8",color:P.dark,outline:"none"}}/>
        <input type="password" placeholder="Password" value={pass} onChange={e=>setPass(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handle()} style={{width:"100%",padding:"12px 14px",borderRadius:12,border:"1.5px solid #e0ddd5",fontSize:14,marginBottom:16,boxSizing:"border-box",background:"#fafaf8",color:P.dark,outline:"none"}}/>
        {err&&<div style={{color:P.coral,fontSize:12,marginBottom:10}}>{err}</div>}
        <button onClick={handle} style={{width:"100%",padding:"13px",background:`linear-gradient(135deg,${P.coral},${P.yellow})`,border:"none",borderRadius:12,color:P.white,fontWeight:800,fontSize:15,cursor:"pointer"}}>
          {mode==="login"?"Good Morning →":"Start My Journey →"}
        </button>
      </div>
    </div>
  );
}

function JournalModal({taskId,dateKey,taskLabel,taskEmoji,taskColor,data,onSave,onClose,showStarEntry}){
  const [text,setText]=useState("");
  const [shareMsg,setShareMsg]=useState("");
  const entries=data[dateKey]?.[taskId]?.journal||[];
  const tags=extractHashtags(text);

  const save=()=>{
    if(!text.trim()) return;
    onSave(taskId,dateKey,text.trim(),extractHashtags(text.trim()));
    setText("");
  };

  const handleShare=async(entryText)=>{
    const result=await shareOrCopy(`${taskEmoji} ${taskLabel}\n\n${entryText}\n\n— Morning Momentum`);
    setShareMsg(result==="copied"?"Copied to clipboard!":"Shared!");
    setTimeout(()=>setShareMsg(""),2000);
  };

  const toggleStar=(idx)=>{
    // pass back up so parent can persist
    onSave("__star__",dateKey,idx,null,taskId);
  };

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(36,50,74,0.55)",display:"flex",alignItems:"flex-end",zIndex:300}} onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div style={{background:P.cream,borderRadius:"22px 22px 0 0",padding:24,width:"100%",maxHeight:"84vh",overflowY:"auto",boxSizing:"border-box"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
          <div style={{fontSize:16,fontWeight:800,color:P.dark}}>{taskEmoji} {taskLabel} — Journal</div>
          <button onClick={onClose} style={{background:"none",border:"none",fontSize:26,cursor:"pointer",color:P.gray,lineHeight:1,padding:"0 4px"}}>×</button>
        </div>
        <textarea value={text} onChange={e=>setText(e.target.value)} placeholder="What stood out? What's worth remembering? Use #hashtags to tag entries." rows={4}
          style={{width:"100%",padding:12,border:`1.5px solid ${taskColor||P.coral}88`,borderRadius:14,fontSize:14,color:P.dark,background:P.white,boxSizing:"border-box",fontFamily:"inherit",lineHeight:1.6,resize:"vertical",outline:"none"}}/>
        {tags.length>0&&<div style={{marginTop:4,fontSize:12,color:P.coral}}>Tags: {tags.join("  ")}</div>}
        <button onClick={save} style={{width:"100%",marginTop:10,padding:13,background:`linear-gradient(135deg,${taskColor||P.coral},${P.yellow})`,border:"none",borderRadius:12,fontWeight:800,fontSize:14,color:P.dark,cursor:"pointer"}}>
          Save Entry
        </button>
        {shareMsg&&<div style={{textAlign:"center",color:P.mint,fontWeight:700,marginTop:6,fontSize:13}}>{shareMsg}</div>}
        {entries.length>0&&(
          <div style={{marginTop:18}}>
            <div style={{fontSize:12,fontWeight:700,color:P.gray,marginBottom:8,textTransform:"uppercase",letterSpacing:0.5}}>Past entries</div>
            {[...entries].reverse().slice(0,15).map((e,i)=>{
              const realIdx=entries.length-1-i;
              const isStarred=e.starred;
              return(
                <div key={i} style={{background:isStarred?`${P.yellow}22`:P.white,borderRadius:12,padding:"10px 13px",marginBottom:8,border:`1px solid ${isStarred?P.yellow:"#e8e4da"}`}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                    <span style={{fontSize:11,color:P.gray}}>{new Date(e.ts).toLocaleString("en-US",{month:"short",day:"numeric",hour:"numeric",minute:"2-digit"})}</span>
                    <div style={{display:"flex",gap:8}}>
                      {showStarEntry&&(
                        <button onClick={()=>toggleStar(realIdx)} style={{background:"none",border:"none",cursor:"pointer",fontSize:16,padding:0}}>{isStarred?"⭐":"☆"}</button>
                      )}
                      <button onClick={()=>handleShare(e.text)} style={{background:"none",border:"none",cursor:"pointer",fontSize:14,padding:0,color:P.gray}}>↗</button>
                    </div>
                  </div>
                  <div style={{fontSize:13,color:P.dark,lineHeight:1.6}}><HighlightedText text={e.text}/></div>
                  {e.tags?.length>0&&<div style={{marginTop:4,display:"flex",gap:4,flexWrap:"wrap"}}>{e.tags.map(t=><span key={t} style={{fontSize:11,background:`${P.coral}22`,color:P.coral,padding:"1px 7px",borderRadius:10}}>{t}</span>)}</div>}
                </div>
              );
            })}
          </div>
        )}
      </div>
    </div>
  );
}

// ============================================================
function SupplementChecklist({dateKey,supplements,data,onToggle,onAdd}){
  const [newName,setNewName]=useState("");
  const taken=data[dateKey]?.supplements||{};
  const addNew=()=>{
    const label=newName.trim();
    if(!label) return;
    onAdd(label); setNewName("");
  };
  return(
    <div style={{marginTop:4}}>
      <div style={{fontSize:11,fontWeight:700,color:P.gray,marginBottom:8,textTransform:"uppercase",letterSpacing:0.5}}>Supplements taken today</div>
      <div style={{display:"flex",flexDirection:"column",gap:6}}>
        {supplements.map(sup=>{
          const checked=!!taken[sup.id];
          return(
            <button key={sup.id} onClick={()=>onToggle(dateKey,sup.id,!checked)}
              style={{display:"flex",alignItems:"center",gap:10,padding:"9px 12px",borderRadius:12,border:`1.5px solid ${checked?P.mint+"bb":"#e8e4da"}`,background:checked?`${P.mint}22`:P.white,cursor:"pointer",textAlign:"left",transition:"all 0.15s"}}>
              <div style={{width:22,height:22,borderRadius:"50%",border:`2px solid ${checked?P.mint:"#ccc"}`,background:checked?P.mint:"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:13,color:P.white,fontWeight:900,transition:"all 0.15s"}}>{checked?"✓":""}</div>
              <span style={{fontSize:13,fontWeight:checked?700:400,color:checked?P.dark:P.gray}}>{sup.label}</span>
            </button>
          );
        })}
      </div>
      <div style={{display:"flex",gap:8,marginTop:10}}>
        <input value={newName} onChange={e=>setNewName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addNew()} placeholder="Add a supplement…"
          style={{flex:1,padding:"8px 12px",border:"1.5px solid #e8e4da",borderRadius:10,fontSize:13,color:P.dark,background:"#fafaf8",outline:"none",boxSizing:"border-box"}}/>
        <button onClick={addNew} style={{padding:"8px 14px",background:P.yellow,border:"none",borderRadius:10,fontWeight:800,fontSize:13,color:P.dark,cursor:"pointer"}}>+ Add</button>
      </div>
    </div>
  );
}

// ============================================================
// JOURNAL PAGE
// ============================================================
function JournalPage({activeDay,data,setData,tasks}){
  const [text,setText]=useState("");
  const [listening,setListening]=useState(false);
  const recogRef=useRef(null);
  const dateKey=getDayDateKey(activeDay);
  const tags=extractHashtags(text);

  const startVoice=()=>{
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){alert("Voice input not supported. Try Chrome.");return;}
    const r=new SR(); r.continuous=true; r.interimResults=true;
    r.onresult=e=>setText(Array.from(e.results).map(r=>r[0].transcript).join(""));
    r.onend=()=>setListening(false);
    recogRef.current=r; r.start(); setListening(true);
  };
  const stopVoice=()=>{recogRef.current?.stop();setListening(false);};

  const save=()=>{
    if(!text.trim()) return;
    const existing=data[dateKey]?.general_journal||[];
    setData(prev=>({...prev,[dateKey]:{...(prev[dateKey]||{}),general_journal:[...existing,{text:text.trim(),ts:new Date().toISOString(),tags:extractHashtags(text.trim())}]}}));
    setText("");
  };

  const allEntries=[];
  Object.entries(data).forEach(([dk,dayData])=>{
    if(!dayData) return;
    (dayData.general_journal||[]).forEach(e=>allEntries.push({dk,task:"General",...e}));
    tasks.forEach(t=>(dayData[t.id]?.journal||[]).forEach(e=>allEntries.push({dk,task:t.label,...e})));
  });
  allEntries.sort((a,b)=>new Date(b.ts)-new Date(a.ts));

  return(
    <div style={{padding:"18px 16px 100px"}}>
      <div style={{fontSize:22,fontWeight:900,color:P.dark,fontFamily:"Georgia,serif",marginBottom:16}}>Journal & Notes</div>
      <div style={{background:P.white,borderRadius:16,padding:16,border:"1px solid #e8e4da",marginBottom:20}}>
        <div style={{fontSize:13,fontWeight:700,color:P.gray,marginBottom:8}}>New entry — {activeDay}</div>
        <textarea value={text} onChange={e=>setText(e.target.value)} placeholder="What's on your mind? Use #hashtags to tag entries." rows={4}
          style={{width:"100%",padding:12,border:"1.5px solid #e8e4da",borderRadius:12,fontSize:14,color:P.dark,background:"#fafaf8",boxSizing:"border-box",resize:"vertical",fontFamily:"inherit",lineHeight:1.6,outline:"none"}}/>
        {tags.length>0&&<div style={{marginTop:4,fontSize:12,color:P.coral}}>Tags: {tags.join("  ")}</div>}
        <div style={{display:"flex",gap:8,marginTop:10}}>
          <button onClick={listening?stopVoice:startVoice} style={{padding:"9px 14px",background:listening?`${P.coral}22`:"#f0eee8",border:`1.5px solid ${listening?P.coral:"#e0ddd5"}`,borderRadius:10,fontSize:13,fontWeight:700,color:listening?P.coral:P.gray,cursor:"pointer"}}>
            {listening?"🔴 Stop":"🎤 Voice"}
          </button>
          <button onClick={save} style={{flex:1,padding:"9px",background:`linear-gradient(135deg,${P.mint},${P.sky})`,border:"none",borderRadius:10,fontSize:13,fontWeight:800,color:P.dark,cursor:"pointer"}}>Save Entry</button>
        </div>
      </div>
      <div style={{fontSize:13,fontWeight:700,color:P.gray,marginBottom:10}}>All journal entries</div>
      {allEntries.length===0
        ?<div style={{color:P.gray,fontSize:14,textAlign:"center",padding:32}}>No entries yet. Start writing! 🌱</div>
        :allEntries.slice(0,30).map((e,i)=>(
          <div key={i} style={{background:P.white,borderRadius:12,padding:"12px 14px",marginBottom:8,border:"1px solid #e8e4da"}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
              <span style={{fontSize:11,fontWeight:700,color:P.coral}}>{e.task}</span>
              <span style={{fontSize:11,color:P.gray}}>{new Date(e.ts).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})}</span>
            </div>
            <div style={{fontSize:13,color:P.dark,lineHeight:1.6}}><HighlightedText text={e.text}/></div>
            {e.tags?.length>0&&<div style={{marginTop:4,display:"flex",gap:4,flexWrap:"wrap"}}>{e.tags.map(t=><span key={t} style={{fontSize:11,background:`${P.coral}22`,color:P.coral,padding:"1px 7px",borderRadius:10}}>{t}</span>)}</div>}
          </div>
        ))
      }
    </div>
  );
}

// ============================================================
// REPORTS PAGE
// ============================================================
function ReportsPage({data,tasks,supplements}){
  const [filter,setFilter]=useState("week");
  const [supFilter,setSupFilter]=useState("all");
  const [reportTab,setReportTab]=useState("overview"); // overview | journal | hashtags | encouragement | subtasks | insights
  const [journalSection,setJournalSection]=useState("all");
  const [hashtagFilter,setHashtagFilter]=useState("all");

  const ranges={week:7,month:30,quarter:90,year:365,all:3650};
  const days=ranges[filter]||7;
  const now=new Date();
  const dateKeys=Array.from({length:days},(_,i)=>{const d=new Date(now);d.setDate(now.getDate()-i);return d.toISOString().split("T")[0];});

  // Day-level scoring
  const dayRows=dateKeys.map(k=>{
    const e=data[k]||{};
    const score=calcScore(e,tasks);
    return{key:k,score:score.total,starred:e.starred,done:tasks.filter(t=>e[t.id]?.status==="done").length};
  }).filter(d=>d.done>0);

  const avgPct=dayRows.length?Math.round(dayRows.reduce((s,d)=>s+d.score,0)/dayRows.length):0;
  const starredDays=dayRows.filter(d=>d.starred);

  // Task frequency
  const taskFreq=tasks.map(t=>({
    label:t.label,color:t.color,emoji:t.emoji||"",
    count:dateKeys.filter(k=>data[k]?.[t.id]?.status==="done").length,
  })).sort((a,b)=>b.count-a.count);

  // Supplement data
  const supRows=supplements.map(s=>{
    const taken=dateKeys.filter(k=>data[k]?.supplements?.[s.id]);
    return{...s,taken:taken.length,total:dateKeys.length,takenKeys:taken};
  });
  const shownSups=supFilter==="all"?supRows:supRows.filter(s=>s.id===supFilter);

  // All journal entries in range
  const allJournalEntries=[];
  dateKeys.forEach(k=>{
    const d=data[k]||{};
    (d.general_journal||[]).forEach(e=>allJournalEntries.push({...e,dk:k,section:"General",type:"journal"}));
    tasks.forEach(t=>{
      (d[t.id]?.journal||[]).forEach(e=>allJournalEntries.push({...e,dk:k,section:t.label,taskId:t.id,type:"journal"}));
      if(d[t.id]?.note) allJournalEntries.push({text:d[t.id].note,ts:k,dk:k,section:t.label,taskId:t.id,type:"note",tags:extractHashtags(d[t.id].note)});
    });
  });
  allJournalEntries.sort((a,b)=>new Date(b.ts)-new Date(a.ts));

  const filteredJournal=journalSection==="all"?allJournalEntries:allJournalEntries.filter(e=>e.section===journalSection);
  const journalSections=["all","General",...tasks.map(t=>t.label)];

  // Hashtag index
  const hashtagIndex={};
  allJournalEntries.forEach(e=>(e.tags||[]).forEach(tag=>{
    if(!hashtagIndex[tag]) hashtagIndex[tag]=[];
    hashtagIndex[tag].push(e);
  }));
  const allTags=Object.keys(hashtagIndex).sort();
  const hashtagEntries=hashtagFilter==="all"?allJournalEntries.filter(e=>e.tags?.length>0):(hashtagIndex[hashtagFilter]||[]);

  // Encouragement entries
  const encEntries=dateKeys.flatMap(k=>{
    const e=data[k]?.encouragement;
    if(!e?.note) return [];
    return[{dk:k,note:e.note,feltGreat:e.feltGreat,wasntEasy:e.wasntEasy,ts:k}];
  });

  // Starred devotionals
  const starredDevotionals=dateKeys.flatMap(k=>{
    const entries=data[k]?.devotional?.journal||[];
    return entries.filter(e=>e.starred).map(e=>({...e,dk:k}));
  });

  // Subtask reports — change #14
  const allSubtasks=tasks.flatMap(t=>(t.subtasks||[]).map(s=>({taskId:t.id,taskLabel:t.label,subtask:s,color:t.color})));
  const subtaskFreq=allSubtasks.map(({taskId,taskLabel,subtask,color})=>({
    taskLabel,subtask,color,
    done:dateKeys.filter(k=>data[k]?.[taskId]?.subtasks?.[subtask]).length,
    total:dateKeys.filter(k=>data[k]).length||1,
  }));

  // ── Weekly self-insight (change #8) ──
  const topTask=taskFreq[0];
  const lowTask=[...taskFreq].reverse()[0];
  const hasEnoughData=dayRows.length>=2;
  const insightLines=[];
  if(hasEnoughData){
    insightLines.push(`You've logged data for ${dayRows.length} day${dayRows.length>1?"s":""} in this period with an average score of ${avgPct}%.`);
    if(topTask?.count>0) insightLines.push(`You seem most consistent with "${topTask.label}" — it appears in ${topTask.count} of ${days} days. That's a real anchor habit.`);
    if(lowTask?.count===0) insightLines.push(`"${lowTask.label}" hasn't been logged recently. If it matters to you, consider attaching it to something you already do reliably.`);
    if(starredDays.length>0) insightLines.push(`You starred ${starredDays.length} day${starredDays.length>1?"s":""} as proud — that's worth noticing. What made those days different?`);
    const devotionalDays=dateKeys.filter(k=>data[k]?.devotional?.status==="done").length;
    if(devotionalDays>=3) insightLines.push(`Devotional consistency is strong (${devotionalDays} days). This may be contributing to your overall rhythm.`);
    const hashCount=Object.keys(hashtagIndex).length;
    if(hashCount>0) insightLines.push(`You've used ${hashCount} unique hashtag${hashCount>1?"s":""}. Your most used: ${Object.entries(hashtagIndex).sort((a,b)=>b[1].length-a[1].length)[0]?.[0]||"–"}.`);
    if(avgPct>=80) insightLines.push(`Overall you're performing strongly. Consider adding one new small habit to keep growing.`);
    else if(avgPct>=50) insightLines.push(`You're in a building phase. Focus on completing 1-2 more habits consistently rather than all of them at once.`);
    else insightLines.push(`Start with your 3 most energizing habits and build from there. Momentum compounds.`);
  }

  const DateFilterBar=()=>(
    <div style={{display:"flex",gap:6,marginBottom:16,flexWrap:"wrap"}}>
      {["week","month","quarter","year","all"].map(f=>(
        <button key={f} onClick={()=>setFilter(f)}
          style={{padding:"6px 14px",borderRadius:20,border:`1.5px solid ${filter===f?P.coral:"#e0ddd5"}`,background:filter===f?`${P.coral}22`:"transparent",color:filter===f?P.coral:P.gray,fontWeight:filter===f?700:400,fontSize:13,cursor:"pointer"}}>
          {f.charAt(0).toUpperCase()+f.slice(1)}
        </button>
      ))}
    </div>
  );

  const tabs=[
    {id:"overview",   label:"Overview"},
    {id:"journal",    label:"Journal"},
    {id:"hashtags",   label:"# Tags"},
    {id:"encouragement",label:"Encourage"},
    {id:"subtasks",   label:"Quick Checks"},
    {id:"insights",   label:"Insights"},
  ];

  return(
    <div style={{padding:"18px 16px 100px"}}>
      <div style={{fontSize:22,fontWeight:900,color:P.dark,fontFamily:"Georgia,serif",marginBottom:12}}>Reports</div>
      {/* Tab bar */}
      <div style={{display:"flex",gap:6,overflowX:"auto",marginBottom:16,paddingBottom:4}}>
        {tabs.map(t=>(
          <button key={t.id} onClick={()=>setReportTab(t.id)}
            style={{padding:"7px 14px",borderRadius:20,border:`1.5px solid ${reportTab===t.id?P.coral:"#e0ddd5"}`,background:reportTab===t.id?`${P.coral}22`:"transparent",color:reportTab===t.id?P.coral:P.gray,fontWeight:reportTab===t.id?700:400,fontSize:12,cursor:"pointer",whiteSpace:"nowrap",flexShrink:0}}>
            {t.label}
          </button>
        ))}
      </div>
      <DateFilterBar/>

      {/* ── OVERVIEW ── */}
      {reportTab==="overview"&&(<>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
          {[{label:"Avg Score",val:avgPct+"%",color:P.coral},{label:"Active Days",val:dayRows.length,color:P.mint},{label:"⭐ Proud Days",val:starredDays.length,color:P.yellow},{label:"Top Habit",val:taskFreq[0]?.label||"–",color:P.sky,small:true}].map(c=>(
            <div key={c.label} style={{background:P.white,borderRadius:14,padding:14,border:"1px solid #e8e4da"}}>
              <div style={{fontSize:11,color:P.gray,marginBottom:4}}>{c.label}</div>
              <div style={{fontSize:c.small?13:26,fontWeight:900,color:c.color,lineHeight:1.2}}>{c.val}</div>
            </div>
          ))}
        </div>
        <div style={{background:P.white,borderRadius:16,padding:16,border:"1px solid #e8e4da",marginBottom:16}}>
          <div style={{fontSize:13,fontWeight:700,color:P.gray,marginBottom:10}}>Habit Frequency</div>
          {taskFreq.map(t=>(
            <div key={t.label} style={{marginBottom:8}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
                <span style={{fontSize:12,color:P.dark}}>{t.emoji} {t.label}</span>
                <span style={{fontSize:12,color:P.gray}}>{t.count}×</span>
              </div>
              <div style={{height:6,background:"#f0eee8",borderRadius:3}}>
                <div style={{height:"100%",width:Math.min(100,(t.count/Math.max(1,days))*100)+"%",background:t.color,borderRadius:3,transition:"width 0.6s"}}/>
              </div>
            </div>
          ))}
        </div>
        {/* Supplement section */}
        <div style={{background:P.white,borderRadius:16,padding:16,border:"1px solid #e8e4da",marginBottom:16}}>
          <div style={{fontSize:13,fontWeight:700,color:P.gray,marginBottom:10}}>Supplement Consistency</div>
          <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:12}}>
            <button onClick={()=>setSupFilter("all")} style={{padding:"4px 12px",borderRadius:16,border:`1.5px solid ${supFilter==="all"?P.mint:"#e0ddd5"}`,background:supFilter==="all"?`${P.mint}33`:"transparent",fontSize:12,fontWeight:supFilter==="all"?700:400,color:supFilter==="all"?P.dark:P.gray,cursor:"pointer"}}>All</button>

              <div key={d.key} style={{padding:"8px 0",borderBottom:"1px solid #f0eee8",display:"flex",justifyContent:"space-between"}}>

            <div style={{fontSize:12,color:P.gray,marginBottom:12}}>Based on your data for the selected period</div>

              ?<div style={{fontSize:14,color:P.gray}}>Log at least 2 days of data to see your personalized insights.</div>
              :insightLines.map((line,i)=>(
                <div key={i} style={{fontSize:14,color:P.dark,lineHeight:1.7,marginBottom:8,paddingLeft:12,borderLeft:`3px solid ${[P.coral,P.mint,P.sky,P.yellow,P.lavender,P.peach][i%6]}`}}>
                  {line}
                </div>
              ))
            }
          </div>
          {starredDevotionals.length>0&&(
            <div style={{background:P.white,borderRadius:16,padding:16,border:"1px solid #e8e4da",marginBottom:16}}>
              <div style={{fontSize:13,fontWeight:700,color:P.gray,marginBottom:8}}>⭐ Starred Devotionals</div>
              {starredDevotionals.map((e,i)=>(

                </div>

      )}
    </div>
  );
}

export default function MorningMomentum(){
  const [user,setUser]=useState(()=>ls("mm_current_user"));
  const [page,setPage]=useState("dashboard");
  const [activeDay,setActiveDay]=useState(getTodayName);
  const [bigConfetti,setBigConfetti]=useState(false);
  const [taskConfetti,setTaskConfetti]=useState(null); // taskId string
  const [expandedTask,setExpandedTask]=useState(null);
  const [journalModal,setJournalModal]=useState(null);

  const UK=user?`mm_data_${user.id}`:"mm_data_guest";
  const TK=user?`mm_tasks_${user.id}`:"mm_tasks_guest";
  const SK=user?`mm_sups_${user.id}`:"mm_sups_guest";

  const [data,setDataRaw]=useState(()=>ls(UK)||{});
  const [tasks]=useState(()=>ls(TK)||DEFAULT_TASK_GROUPS);
  const [supplements,setSupsRaw]=useState(()=>ls(SK)||DEFAULT_SUPPLEMENTS);

  const setData=useCallback(updater=>{
    setDataRaw(prev=>{
      const n=typeof updater==="function"?updater(prev):updater;
      lsSet(UK,n); return n;
    });
  },[UK]);
  const setSups=useCallback(v=>{setSupsRaw(v);lsSet(SK,v);},[SK]);

  useEffect(()=>{if(user)lsSet("mm_current_user",user);},[user]);
  useEffect(()=>{if(bigConfetti)setTimeout(()=>setBigConfetti(false),3500);},[bigConfetti]);
  useEffect(()=>{if(taskConfetti)setTimeout(()=>setTaskConfetti(null),1400);},[taskConfetti]);

  const todayName=getTodayName();
  const theme=DAY_THEMES[activeDay]||DAY_THEMES.Monday;
  const scripture=getWeekScripture();

  const getEntries=useCallback(day=>data[getDayDateKey(day)]||{},[data]);

  const setEntry=useCallback((day,taskId,field,value)=>{
    const key=getDayDateKey(day);
    setData(prev=>{
      const updated={...prev,[key]:{...(prev[key]||{}),[taskId]:{...(prev[key]?.[taskId]||{}),[field]:value}}};
      // Check all-done for big confetti
      const allDone=tasks.every(t=>updated[key]?.[t.id]?.status==="done");
      if(allDone) setBigConfetti(true);
      return updated;
    });
  },[tasks,setData]);

  // Mark task done + fire mini confetti + auto-check all subtasks
  const markTaskDone=useCallback((day,taskId,taskSubtasks=[])=>{
    const key=getDayDateKey(day);
    setData(prev=>{
      const cur=prev[key]?.[taskId]||{};
      const nowDone=cur.status!=="done";
      // If marking done, auto-check all subtasks
      const newSubs=nowDone?Object.fromEntries(taskSubtasks.map(s=>[s,true])):cur.subtasks||{};
      const updated={...prev,[key]:{...(prev[key]||{}),[taskId]:{...cur,status:nowDone?"done":"",subtasks:newSubs}}};
      const allDone=tasks.every(t=>updated[key]?.[t.id]?.status==="done");
      if(allDone) setBigConfetti(true);
      return updated;
    });
    if(tasks.find(t=>t.id===taskId)?.status!=="done") setTaskConfetti(taskId);
  },[tasks,setData]);

  const toggleSupplement=useCallback((dateKey,supId,checked)=>{
    setData(prev=>({...prev,[dateKey]:{...(prev[dateKey]||{}),supplements:{...(prev[dateKey]?.supplements||{}),[supId]:checked}}}));
  },[setData]);

  const addSupplement=useCallback(label=>{
    const id="sup_"+label.toLowerCase().replace(/\s+/g,"_")+"_"+Date.now();
    setSups(prev=>[...prev,{id,label}]);
  },[setSups]);

  const saveJournalEntry=useCallback((taskId,dateKey,text,tags,starTargetTaskId)=>{
    // Special: toggling star on an existing entry
    if(taskId==="__star__"){
      const idx=text; // text is actually the index here
      setData(prev=>{
        const entries=[...(prev[dateKey]?.[starTargetTaskId]?.journal||[])];
        entries[idx]={...entries[idx],starred:!entries[idx]?.starred};
        return{...prev,[dateKey]:{...(prev[dateKey]||{}),[starTargetTaskId]:{...(prev[dateKey]?.[starTargetTaskId]||{}),journal:entries}}};
      });
      return;
    }
    setData(prev=>{
      const existing=prev[dateKey]?.[taskId]?.journal||[];
      return{...prev,[dateKey]:{...(prev[dateKey]||{}),[taskId]:{...(prev[dateKey]?.[taskId]||{}),journal:[...existing,{text,ts:new Date().toISOString(),tags:tags||[]}]}}};
    });
  },[setData]);

  const toggleStar=useCallback(day=>{
    const key=getDayDateKey(day);
    setData(prev=>({...prev,[key]:{...(prev[key]||{}),starred:!prev[key]?.starred}}));
  },[setData]);

  if(!user) return<LoginScreen onLogin={u=>setUser(u)}/>;

  const todayEntries=getEntries(activeDay);
  const score=calcScore(todayEntries,tasks);
  const completedCount=tasks.filter(t=>todayEntries[t.id]?.status==="done").length;
  const todayKey=getDayDateKey(activeDay);
  const isStarred=data[todayKey]?.starred;

  // ── DASHBOARD ────────────────────────────────────────────
  const Dashboard=()=>{
    const enc=ENCOURAGEMENT_QUOTES[new Date().getDate()%ENCOURAGEMENT_QUOTES.length];

          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
            <div>
              <div style={{fontSize:11,color:"rgba(36,50,74,0.7)",fontWeight:700,letterSpacing:1.5,textTransform:"uppercase",marginBottom:4}}>
                {new Date().toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"})}
              </div>
              <div style={{fontSize:26,fontWeight:900,color:P.dark,fontFamily:"Georgia,serif",lineHeight:1.2}}>{theme.name}</div>
              <div style={{fontSize:13,color:"rgba(36,50,74,0.75)",fontStyle:"italic",marginTop:4}}>{theme.tagline}</div>
            </div>
            <button onClick={()=>toggleStar(activeDay)} style={{background:"none",border:"none",cursor:"pointer",fontSize:24,padding:4}}>{isStarred?"⭐":"☆"}</button>
          </div>
          <div style={{marginTop:20,display:"flex",gap:14,alignItems:"center"}}>

            </div>
            <div>
              <div style={{fontSize:24,fontWeight:900,color:P.dark}}>{completedCount}<span style={{fontSize:14,fontWeight:500,color:"rgba(36,50,74,0.6)"}}>/{tasks.length}</span></div>
              <div style={{fontSize:12,color:"rgba(36,50,74,0.7)"}}>habits today</div>
              <div style={{fontSize:12,color:"rgba(36,50,74,0.8)",marginTop:2}}>👤 {user.name}</div>
            </div>
          </div>
        </div>
        <div style={{padding:"16px 16px 0",display:"flex",flexDirection:"column",gap:14}}>
          {/* Scripture + Declaration */}
          <div style={{background:`linear-gradient(135deg,${P.lavender}44,${P.lavender}22)`,borderRadius:16,padding:16,border:`1px solid ${P.lavender}`}}>
            <div style={{fontSize:11,fontWeight:700,color:P.dark,letterSpacing:1,textTransform:"uppercase",marginBottom:8}}>📖 Memory Scripture of the Week</div>

            <div style={{fontSize:12,fontWeight:700,color:"#7b5ea7",marginBottom:10}}>— {scripture.ref}</div>
            {/* Declaration (change #4) */}
            <div style={{background:`${P.lavender}44`,borderRadius:10,padding:"10px 12px",marginBottom:10,borderLeft:`3px solid #7b5ea7`}}>
              <div style={{fontSize:11,fontWeight:700,color:"#7b5ea7",marginBottom:3,textTransform:"uppercase",letterSpacing:0.5}}>Declaration</div>
              <div style={{fontSize:13,color:P.dark,lineHeight:1.6,fontStyle:"italic"}}>{scripture.declaration}</div>
            </div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              {["Read it","Practiced it","Memorized it"].map(s=>{
                const wk=getWeekKey(),done=data[`scripture_${wk}`]?.[s];
                return(
                  <button key={s} onClick={()=>setData(p=>({...p,[`scripture_${wk}`]:{...(p[`scripture_${wk}`]||{}),[s]:!done}}))}
                    style={{fontSize:11,padding:"5px 10px",borderRadius:20,border:`1.5px solid ${done?"#7b5ea7":P.lavender}`,background:done?P.lavender:"transparent",color:done?"#5a3f87":P.gray,fontWeight:done?700:400,cursor:"pointer"}}>
                    {done?"✓ ":""}{s}
                  </button>
                );
              })}
            </div>
          </div>
          {/* Quote */}
          <div style={{background:`${P.yellow}33`,borderRadius:14,padding:"12px 16px",border:`1px solid ${P.yellow}88`}}>
            <div style={{fontSize:13,color:P.dark,fontStyle:"italic"}}>✨ {enc}</div>
          </div>
          {/* Quick nav — "This Week" section REMOVED per change #3 */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            {[
              {id:"today",   icon:"📋",label:"Today's Routine",bg:`${P.coral}22`,  color:P.coral},
              {id:"weekly",  icon:"📅",label:"Weekly View",    bg:`${P.sky}22`,    color:"#4a9cc7"},
              {id:"journal", icon:"📝",label:"Journal",        bg:`${P.mint}22`,   color:"#3aab7a"},
              {id:"reports", icon:"📊",label:"Reports",        bg:`${P.lavender}33`,color:"#7b5ea7"},
            ].map(n=>(
              <button key={n.id} onClick={()=>setPage(n.id)} style={{background:n.bg,border:`1px solid ${n.color}44`,borderRadius:14,padding:"14px 12px",cursor:"pointer",textAlign:"left"}}>
                <div style={{fontSize:22,marginBottom:6}}>{n.icon}</div>
                <div style={{fontSize:13,fontWeight:700,color:n.color}}>{n.label}</div>
              </button>
            ))}
          </div>
        </div>
      </div>
    );
  };

  // ── TODAY VIEW ───────────────────────────────────────────

    return(

        <div style={{background:`linear-gradient(135deg,${theme.color}cc,${theme.color}77)`,padding:"18px 16px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontSize:18,fontWeight:900,color:P.dark,fontFamily:"Georgia,serif"}}>{theme.emoji} {theme.name}</div>

            <div style={{textAlign:"center",background:"rgba(255,255,255,0.5)",borderRadius:12,padding:"6px 12px"}}>

            </div>
          </div>
        </div>
        <div style={{padding:"12px 14px",display:"flex",flexDirection:"column",gap:10}}>

                    {task.sourceType==="links"&&featSrc?.url&&(
                      <div style={{background:`${task.color}22`,borderRadius:12,padding:10,marginBottom:10}}>
                        <div style={{fontSize:11,fontWeight:700,color:P.gray,marginBottom:4}}>💡 Helpful Resource</div>
                        <div style={{fontSize:13,fontWeight:600,color:P.dark}}>{featSrc.title}</div>
                        <div style={{fontSize:12,color:P.gray,marginBottom:6}}>{featSrc.desc}</div>
                        <a href={featSrc.url} target="_blank" rel="noopener noreferrer" style={{fontSize:12,padding:"5px 12px",background:task.color,color:P.dark,borderRadius:10,textDecoration:"none",fontWeight:700}}>Open →</a>
                      </div>
                    )}
                    {/* Share button for weights / learning */}
                    {task.hasShare&&(
                      <button onClick={async()=>{
                        const noteText=entry.note||"";
                        const journalText=(entry.journal||[]).map(j=>j.text).join("\n");
                        const combined=`${task.emoji} ${task.label}\n${noteText}\n${journalText}`.trim();
                        const r=await shareOrCopy(combined||`${task.emoji} Completed ${task.label} today!`);
                        // brief feedback handled in parent
                      }} style={{marginBottom:8,width:"100%",padding:"8px",background:`${task.color}22`,border:`1px solid ${task.color}88`,borderRadius:10,fontSize:12,fontWeight:700,color:P.dark,cursor:"pointer"}}>
                        ↗ Share this entry
                      </button>
                    )}
                    {/* Encouragement corner */}
                    {task.encouragementCorner&&(
                      <div style={{background:"#FFB3C633",borderRadius:12,padding:12,marginBottom:10}}>
                        <div style={{fontSize:12,fontWeight:700,color:P.dark,marginBottom:6}}>💌 Today — Encourage {encTarget.who}</div>
                        {encTarget.ideas.map((idea,i)=><div key={i} style={{fontSize:13,color:P.dark,marginBottom:3}}>• {idea}</div>)}
                        {/* Checkboxes — change #5 */}
                        <div style={{display:"flex",gap:10,marginTop:10}}>
                          {["feltGreat","wasntEasy"].map(k=>{
                            const label=k==="feltGreat"?"Felt great":"Wasn't easy";
                            const checked=!!data[currentDateKey]?.encouragement?.[k];
                            return(
                              <button key={k} onClick={()=>{
                                setData(prev=>({...prev,[currentDateKey]:{...(prev[currentDateKey]||{}),encouragement:{...(prev[currentDateKey]?.encouragement||{}),[k]:!checked}}}));
                              }} style={{display:"flex",alignItems:"center",gap:6,padding:"5px 10px",border:`1.5px solid ${checked?"#FFB3C6":"#e0ddd5"}`,borderRadius:20,background:checked?"#FFB3C622":"transparent",cursor:"pointer",fontSize:12,color:checked?P.dark:P.gray,fontWeight:checked?700:400}}>
                                <div style={{width:16,height:16,borderRadius:"50%",border:`2px solid ${checked?"#FFB3C6":"#ccc"}`,background:checked?"#FFB3C6":"transparent",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,color:P.white}}>{checked?"✓":""}</div>
                                {label}
                              </button>
                            );
                          })}
                        </div>
                      </div>
                    )}
                    {/* Note — "My action:" for encouragement, "Quick note" otherwise  (change #5) */}
                    {task.hasNotes&&(
                      <input placeholder={task.encouragementCorner?"My action:":"Quick note… use #hashtags"}
                        value={entry.note||""} onChange={e=>setEntry(activeDay,task.id,"note",e.target.value)}
                        style={{width:"100%",padding:"8px 12px",border:"1px solid #e8e4da",borderRadius:10,fontSize:13,background:"#fafaf8",color:P.dark,boxSizing:"border-box",marginBottom:task.hasJournal?6:0,outline:"none"}}/>
                    )}
                    {/* Journal */}
                    {task.hasJournal&&(
                      <button onClick={()=>setJournalModal({taskId:task.id,dateKey:currentDateKey,task})}
                        style={{width:"100%",padding:"9px",background:`${task.color}22`,border:`1px solid ${task.color}88`,borderRadius:10,fontSize:12,fontWeight:700,color:P.dark,cursor:"pointer"}}>
                        📝 {(entry.journal?.length||0)>0?`Journal (${entry.journal.length} entries)`:"Add Journal Entry"}
                      </button>
                    )}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      </div>
    );
  };

  // ── WEEKLY ───────────────────────────────────────────────
  const WeeklyView=()=>(
    <div style={{padding:"18px 16px 100px"}}>
      <div style={{fontSize:22,fontWeight:900,color:P.dark,fontFamily:"Georgia,serif",marginBottom:16}}>This Week</div>
      {["Monday","Tuesday","Wednesday","Thursday","Friday"].map(day=>{
        const e=getEntries(day),s=calcScore(e,tasks),t=DAY_THEMES[day];
        const key=getDayDateKey(day),starred=data[key]?.starred;
        const done=tasks.filter(tk=>e[tk.id]?.status==="done").length;
        return(
          <button key={day} onClick={()=>{setActiveDay(day);setPage("today");}}
            style={{width:"100%",background:P.white,border:`1.5px solid ${s.total>0?t.color+"88":"#e8e4da"}`,borderRadius:16,padding:"14px",marginBottom:10,display:"flex",alignItems:"center",gap:12,cursor:"pointer",textAlign:"left",boxShadow:s.total>0?`0 2px 12px ${t.color}33`:"none"}}>
            <div style={{width:42,height:42,borderRadius:"50%",background:`${t.color}44`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>{t.emoji}</div>
            <div style={{flex:1}}>
              <div style={{fontSize:14,fontWeight:800,color:P.dark}}>{t.name} {starred?"⭐":""}</div>
              <div style={{fontSize:12,color:P.gray,marginTop:1}}>{done}/{tasks.length} habits</div>
            </div>
            <div style={{fontSize:22,fontWeight:900,color:s.total>0?t.color:P.gray}}>{s.total?s.total+"%":"–"}</div>
          </button>
        );
      })}
    </div>
  );

  function ProgressRing({pct,size=72,stroke=6,color=P.coral}){
    const r=(size-stroke*2)/2, c=2*Math.PI*r, off=c-(pct/100)*c;
    return(
      <svg width={size} height={size} style={{transform:"rotate(-90deg)",flexShrink:0}}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#e8e4da" strokeWidth={stroke}/>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke} strokeDasharray={c} strokeDashoffset={off} strokeLinecap="round" style={{transition:"stroke-dashoffset 0.8s ease"}}/>
      </svg>
    );
  }

  // ── RENDER ───────────────────────────────────────────────
  const renderPage=()=>{
    switch(page){
      case"dashboard": return<Dashboard/>;
      case"today":     return<TodayView/>;
      case"weekly":    return<WeeklyView/>;
      case"journal":   return<JournalPage activeDay={activeDay} data={data} setData={setData} tasks={tasks}/>;
      case"reports":   return<ReportsPage data={data} tasks={tasks} supplements={supplements}/>;
      default:         return<Dashboard/>;
    }
  };

  return(
    <div style={{fontFamily:"-apple-system,'Segoe UI',sans-serif",background:P.cream,minHeight:"100vh",maxWidth:430,margin:"0 auto",position:"relative",color:P.dark}}>
      <BigConfetti show={bigConfetti}/>
      {journalModal&&(
        <JournalModal
          taskId={journalModal.taskId} dateKey={journalModal.dateKey}
          taskLabel={journalModal.task.label} taskEmoji={journalModal.task.emoji}
          taskColor={journalModal.task.color} data={data}
          onSave={saveJournalEntry}
          onClose={()=>setJournalModal(null)}
          showStarEntry={journalModal.task.hasStarEntry}
        />
      )}
      {/* Top bar */}
      <div style={{background:P.white,borderBottom:"1px solid #e8e4da",padding:"11px 16px",display:"flex",justifyContent:"space-between",alignItems:"center",position:"sticky",top:0,zIndex:50,boxShadow:"0 1px 8px rgba(36,50,74,0.06)"}}>
        <div style={{fontSize:15,fontWeight:900,color:P.dark,letterSpacing:-0.5}}>☀️ Morning Momentum</div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          {(page==="today"||page==="dashboard")&&(
            <select value={activeDay} onChange={e=>setActiveDay(e.target.value)}
              style={{fontSize:12,border:"1px solid #e0ddd5",borderRadius:8,padding:"5px 8px",background:P.cream,color:P.dark,cursor:"pointer"}}>
              {["Monday","Tuesday","Wednesday","Thursday","Friday"].map(d=><option key={d} value={d}>{d}</option>)}
            </select>
          )}
          <button onClick={()=>{setUser(null);localStorage.removeItem("mm_current_user");}} style={{fontSize:11,color:P.gray,background:"none",border:"none",cursor:"pointer"}}>Sign out</button>
        </div>
      </div>
      <div>{renderPage()}</div>
      {/* Bottom Nav */}
      <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:430,background:P.white,borderTop:"1px solid #e8e4da",display:"flex",zIndex:50,boxShadow:"0 -2px 12px rgba(36,50,74,0.06)"}}>
        {[{id:"dashboard",icon:"🏠",label:"Home"},{id:"today",icon:"📋",label:"Today"},{id:"weekly",icon:"📅",label:"Week"},{id:"journal",icon:"📝",label:"Journal"},{id:"reports",icon:"📊",label:"Reports"}].map(n=>(
          <button key={n.id} onClick={()=>setPage(n.id)} style={{flex:1,padding:"10px 4px 12px",background:"transparent",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
            <span style={{fontSize:20}}>{n.icon}</span>
            <span style={{fontSize:10,fontWeight:page===n.id?800:400,color:page===n.id?P.coral:P.gray}}>{n.label}</span>
            {page===n.id&&<div style={{width:16,height:2.5,background:P.coral,borderRadius:2}}/>}
          </button>
        ))}
      </div>
    </div>
  );
}
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<MorningMomentum />);
  </script>
</body>
</html>
